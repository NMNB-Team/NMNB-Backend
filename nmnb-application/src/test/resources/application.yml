spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: ${TEST_URL}
    driver-class-name: org.h2.Driver
    username: ${TEST_USERNAME}
    password: ${TEST_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: ${TEST_REDIS_URL}
      port: ${REDIS_PORT}

cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
    region:
      static: ${AWS_REGION}
    s3:
      bucket: ${S3_BUCKET_NAME_FOR_SERVICE}