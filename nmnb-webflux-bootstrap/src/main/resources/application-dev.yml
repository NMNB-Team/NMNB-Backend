spring:
  config:
    activate:
      on-profile: dev
  r2dbc:
    username: ${R2DBC_USERNAME}
    password: ${R2DBC_PASSWORD}
    url: ${R2DBC_URL}
  sql:
    init:
      mode: never

  data:
    redis:
      host: ${DEV_REDIS_URL}
      port: ${REDIS_PORT}

cloud:
  aws:
    s3:
      bucket: ${S3_BUCKET_NAME_FOR_SERVICE}

jwt:
  refresh-expiration-time: ${DEV_REFRESH_EXPIRATION_TIME}
  access-expiration-time: ${DEV_ACCESS_EXPIRATION_TIME}