spring:
  config:
    activate:
      on-profile: local
  r2dbc:
    username: ${LOCAL_R2DBC_USERNAME}
    password: ${LOCAL_R2DBC_PASSWORD}
    url: ${LOCAL_R2DBC_URL}

  data:
    redis:
      host: ${LOCAL_REDIS_URL}
      port: ${REDIS_PORT}

cloud:
  aws:
    s3:
      bucket: ${S3_BUCKET_NAME_FOR_SERVICE}

jwt:
  refresh-expiration-time: ${REFRESH_EXPIRATION_TIME}
  access-expiration-time: ${ACCESS_EXPIRATION_TIME}