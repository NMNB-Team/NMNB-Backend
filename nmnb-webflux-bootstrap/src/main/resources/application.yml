spring:
  application:
    name: nmnb
  profiles:
    active: dev
  webflux:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB

  logging:
    level:
      org:
        springframework:
          r2dbc: DEBUG
cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
    region:
      static: ${AWS_REGION}
    s3:
      bucket: ${S3_BUCKET_NAME_FOR_SERVICE}


jwt:
  refresh-expiration-time: ${REFRESH_EXPIRATION_TIME}
  access-expiration-time: ${ACCESS_EXPIRATION_TIME}
  secret: ${JWT_SECRET_KEY}


logging:
  level:
    org:
      springframework: DEBUG
      springframework.r2dbc: DEBUG