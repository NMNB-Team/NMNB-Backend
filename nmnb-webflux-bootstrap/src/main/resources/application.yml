spring:
  application:
    name: nmnb
  profiles:
    active: dev
  webflux:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB

  logging:
    level:
      org:
        springframework:
          r2dbc: DEBUG
cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
    region:
      static: ${AWS_REGION}

jwt:
  secret: ${JWT_SECRET_KEY}


logging:
  level:
    org:
      springframework: DEBUG
      springframework.r2dbc: DEBUG

apple:
  client-id: ${APPLE_CLIENT_ID}
  team-id: ${APPLE_TEAM_ID}
  key-id: ${APPLE_KEY_ID}
  key-path: ${APPLE_KEY_PATH}
  token-expiration: ${APPLE_TOKEN_EXPIRATION_TIME}
  jwt-set-url: ${JWT_SET_URL}

springdoc:
  api-docs:
    path: /netty/v3/api-docs
  swagger-ui:
    path: /netty/swagger-ui.html
    config-url: /netty/v3/api-docs/swagger-config
    url: /netty/v3/api-docs
    operationsSorter: alpha
    display-request-duration: true