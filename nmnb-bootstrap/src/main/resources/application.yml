spring:
  application:
    name: nmnb
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
    region:
      static: ${AWS_REGION}
    s3:
      urlPrefix: ${S3_URL_PREFIX}
      defaultProfileImagePath: ${S3_DEFAULT_PROFILE_IMAGE_PATH}

jwt:
  secret: ${JWT_SECRET_KEY}

springdoc:
  swagger-ui:
    tagsSorter: alpha