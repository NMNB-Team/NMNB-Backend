spring:
  config:
    activate:
      on-profile: prod
  datasource:
    username: ${PROD_DB_USERNAME}
    password: ${PROD_DB_PASSWORD}
    url: ${PROD_DB_URL}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: never
  jpa:
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        use_sql_comments: true
        hbm2ddl:
          auto: update
        default_batch_fetch_size: 1000

  data:
    redis:
      host: ${PROD_REDIS_URL}
      port: ${PROD_REDIS_PORT}

cloud:
  aws:
    s3:
      bucket: ${S3_BUCKET_NAME_FOR_PROD_SERVICE}

jwt:
  refresh-expiration-time: ${PROD_REFRESH_EXPIRATION_TIME}
  access-expiration-time: ${PROD_ACCESS_EXPIRATION_TIME}