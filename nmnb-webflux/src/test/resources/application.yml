spring:
  config:
    activate:
      on-profile: test
  r2dbc:
    url: ${R2DBC_TEST_URL}
    username: ${TEST_USERNAME}
    password: ${TEST_PASSWORD}

  data:
    redis:
      host: ${TEST_REDIS_URL}
      port: ${REDIS_PORT}

cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
    region:
      static: ${AWS_REGION}
    s3:
      bucket: ${S3_BUCKET_NAME_FOR_SERVICE}
      urlPrefix: ${S3_URL_PREFIX}
      defaultProfileImagePath: ${S3_DEFAULT_PROFILE_IMAGE_PATH}

jwt:
  refresh-expiration-time: ${REFRESH_EXPIRATION_TIME}
  access-expiration-time: ${ACCESS_EXPIRATION_TIME}
  secret: ${JWT_SECRET_KEY}

apple:
  client-id: ${APPLE_CLIENT_ID}
  team-id: ${APPLE_TEAM_ID}
  key-id: ${APPLE_KEY_ID}
  key-path: ${APPLE_KEY_PATH}
  token-expiration: ${APPLE_TOKEN_EXPIRATION_TIME}
  jwt-set-url: ${JWT_SET_URL}
